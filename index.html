function getDone(a){try{return JSON.parse(localStorage.getItem(doneKey(a))||"[]");}catch(e){return [];}}

function render(){

 const done=getDone(ART);const total=a.songs.length;const pct=Math.round(done.length/total*100);
 let h=`<div style="font-size:14px;color:var(--dim)">已學會 <b style="color:var(--acc);font-size:16px">${done.length}</b> / ${total} 首</div>

 h+=koCard();

 let lastEra="";
 a.songs.forEach((s,i)=>{ if(s.era!==lastEra){h+=`<div class="era">${s.era}</div>`;lastEra=s.era;} h+=songCard(s,i); });
 h+=`<div class="foot">跟著愛的偶像把韓文唱進心裡 🎤 · 進度存在這支手機 · 想加歌或加第二支(Super Junior…)再跟我說</div>`;

}

/* ===== 隨堂測驗:中文→한글 四選一,選項依「意思」去重避免重複答案 ===== */
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function poolAll(){const p=[];ARTISTS[ART].songs.forEach(s=>s.voc.forEach(v=>p.push(v)));return p;}
function startQuiz(i){
 const s=ARTISTS[ART].songs[i];const box=document.getElementById("quiz"+i);
 const qs=shuffle(s.voc).slice(0,Math.min(5,s.voc.length));
 const pool=poolAll();
 box.dataset.qi=0;box.dataset.score=0;box.dataset.total=qs.length;
 box._qs=qs;box._pool=pool;
 showQ(i);
}
function showQ(i){
 const box=document.getElementById("quiz"+i);const qi=+box.dataset.qi;const qs=box._qs;
 if(qi>=qs.length){
   const sc=+box.dataset.score,t=+box.dataset.total;
   const msg=sc===t?"🏆 全對!你超強":sc>=t*0.6?"👍 不錯,再來一次更熟":"💪 多聽幾次發音,再挑戰";
   box.innerHTML=`<div class="quiz"><div class="qres">得分 ${sc}/${t} — ${msg}</div><button class="btn" onclick="startQuiz(${i})">🔁 再測一次</button></div>`;return;
 }
 const correct=qs[qi];
 // 干擾項:意思(中文)不同的詞,去重
 const seen={[correct[2]]:1};const distract=[];
 shuffle(box._pool).forEach(v=>{ if(distract.length<3 && !seen[v[2]]){seen[v[2]]=1;distract.push(v);} });
 const opts=shuffle([correct,...distract]);
 box.innerHTML=`<div class="quiz">
   <div style="color:var(--dim);font-size:13px">第 ${qi+1}/${qs.length} 題 · 哪個韓文是這個意思?</div>
   <div class="qq"><b>${correct[2]}</b></div>
   ${opts.map(o=>`<button class="opt" onclick="answer(${i},'${o[0]}','${correct[0]}')">${o[0]} <span style="color:var(--dim);font-size:14px">${o[1]}</span></button>`).join("")}
   <div class="qres" id="qr${i}"></div></div>`;
}
function answer(i,chosen,correct){
 const box=document.getElementById("quiz"+i);
 const btns=box.querySelectorAll(".opt");
 btns.forEach(b=>{b.onclick=null;const ko=b.textContent.trim().split(" ")[0];if(ko===correct)b.classList.add("ok");else if(ko===chosen)b.classList.add("no");});
 const ok=chosen===correct;
 if(ok)box.dataset.score=(+box.dataset.score)+1;
 speak(correct);
 document.getElementById("qr"+i).innerHTML=(ok?"✅ 答對!":"❌ 正解:"+correct)+` <button class="btn" style="margin-left:8px" onclick="nextQ(${i})">下一題 ▶</button>`;
}
function nextQ(i){const box=document.getElementById("quiz"+i);box.dataset.qi=(+box.dataset.qi)+1;showQ(i);}

/* ===== 自我檢查:?test 時跑,驗資料完整 + 去重邏輯 ===== */
function selftest(){
 let n=0,ok=0;
 for(const a in ARTISTS)ARTISTS[a].songs.forEach(s=>{
   n++;console.assert(s.ko&&s.en&&s.story&&s.chorus&&s.tip,"缺欄位",a,s.en);
   console.assert(Array.isArray(s.voc)&&s.voc.length>=4,"voc<4",a,s.en);
   s.voc.forEach(v=>console.assert(v.length===3&&/[가-힣]/.test(v[0]),"voc格式",a,s.en,v));
   ok++;
 });
 // 去重:correct 的意思不該出現在干擾項
 const c=["사랑","sarang","愛"];const seen={[c[2]]:1};let dup=0;
 poolAll().forEach(v=>{if(v[2]===c[2]&&v[0]!==c[0])return;if(seen[v[2]]&&v[0]!==c[0])dup++;});
 console.log(`✅ selftest:${ok}/${n} 首通過,共 ${poolAll().length} 個單字`);
}
if(location.search.includes("test"))selftest();
